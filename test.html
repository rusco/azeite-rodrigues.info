<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Health Test</title>
</head>
<body style="font-family:sans-serif;padding:2rem;">
  <h1>Health Test</h1>
  <button id="btn" style="padding:0.5rem 1rem;">Go</button>
  <pre id="output" style="margin-top:1rem;background:#eee;padding:1rem;"></pre>

  <script>
    async function test() {
      try {
        const res = await fetch("https://api.azeite-rodrigues.info/api/health", {
          method: "GET"
        });
        const data = await res.json();
        document.getElementById("output").textContent =
          "Status: " + res.status + "\n" + JSON.stringify(data, null, 2);
      } catch (err) {
        document.getElementById("output").textContent = "Error: " + err;
        console.error(err);
      }
    }
    document.getElementById("btn").addEventListener("click", test);
  </script>
</body>
</html>
